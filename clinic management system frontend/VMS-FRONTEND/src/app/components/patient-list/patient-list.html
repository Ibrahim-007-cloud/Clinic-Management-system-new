<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Clinic Patient Records</h2>
    <button class="btn btn-primary" routerLink="/add-patient">+ Register New Patient</button>
  </div>

  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Contact</th>
            <th>Medical Problem</th>
            <th>Assigned Doctor</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of patients">
            <td><strong>#{{p.id}}</strong></td>
            <td>{{p.patientName}}</td>
            <td>{{p.age}}</td>
            <td><span class="badge bg-secondary">{{p.gender}}</span></td>
            <td>{{p.contact}}</td>
            <td>{{p.problem}}</td>
            <td><code>Dr. {{p.doctorName}}</code></td>
            <td class="text-center">
              <button class="btn btn-sm btn-warning me-2" [routerLink]="['/edit-patient', p.id]">Edit</button>
              <button class="btn btn-sm btn-danger" (click)="deletePatient(p.id)">Delete</button>
            </td>
          </tr>
          <tr *ngIf="patients.length === 0">
            <td colspan="8" class="text-center text-muted py-4">No patient profiles found in database. Click Register above to add one!</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
